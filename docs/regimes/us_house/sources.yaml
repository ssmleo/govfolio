jurisdiction: us_house
candidates:
  - url: https://disclosures-clerk.house.gov/FinancialDisclosure
    contains: "The Office of the Clerk's Financial Disclosure Reports portal: a browse/search/download
      interface for House Member, officer, employee, and congressional-candidate financial
      disclosure filings, including Periodic Transaction Reports (PTRs), annual Financial
      Disclosure statements, and their amendments."
    official_rationale: "Hosted on disclosures-clerk.house.gov, a house.gov subdomain
      (confirmed via CSP header 'connect-src *.house.gov' on the Clerk homepage and via
      direct navigation links between clerk.house.gov and this domain). The Office of the
      Clerk of the U.S. House of Representatives is the statutory recipient of financial
      disclosure filings under the Ethics in Government Act of 1978, as amended by the STOCK
      Act of 2012 (Pub. L. 112-105 sec. 6, adding EIGA sec. 103(l), 5 U.S.C. app. 4 sec. 101
      et seq.) — confirmed via independent web search of secondary authoritative sources
      (Congressional Research Service report R47818 'Laws Governing Financial Disclosure';
      House Committee on Ethics financial-disclosure page; FLRA's 'Financial Disclosure and
      the STOCK Act'), which state FDs and PTRs must be filed with the Clerk (for the House)
      or Secretary of the Senate, not the Ethics Committee."
    evidence:
      - a12698461d52486b706098ba4c1f36acce7a2ad7ce71bb2629257c72e13dc146.financial-disclosure-page.html
      - a12698461d52486b706098ba4c1f36acce7a2ad7ce71bb2629257c72e13dc146.retrieval.json
      - 219527786b15ee97637c45b0f8febcebad8427add9b14555e04f87bee8f64197.clerk-home.html
      - 219527786b15ee97637c45b0f8febcebad8427add9b14555e04f87bee8f64197.retrieval.json
    notes: "The statutory-basis text itself is not present in this page's static HTML (it is
      a JS single-page app whose report data loads dynamically); the legal-authority claim is
      corroborated via independent secondary sources cited above rather than scraped from this
      page. This is Phase 0's primary candidate; Phase 1 (SURVEY) should re-verify the claim
      chain and record it as a proper legal_basis claim with its own evidence."

