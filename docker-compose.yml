services:
  postgres:
    image: postgres:16
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: govfolio
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d govfolio"]
      interval: 5s
      timeout: 5s
      retries: 10
