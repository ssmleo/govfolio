name: ci

on:
  push:
    branches: [main, "loop/**"]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --check
      - run: cargo clippy --all-targets -- -D warnings
      - run: cargo test --workspace
      # Contract drift gate (design §6.1): openapi.json is generated-but-committed,
      # never hand-edited; regeneration must be a no-op.
      - run: cargo run -p api --bin openapi && git diff --exit-code packages/contracts/

  db:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: govfolio
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/govfolio
    steps:
      - uses: actions/checkout@v5
      - uses: Swatinem/rust-cache@v2
      # #[ignore] sqlx suites arrive in Task 3+; with zero ignored tests this passes trivially.
      - run: cargo test --workspace -- --ignored

  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter web lint
      - run: pnpm --filter web typecheck
      - run: pnpm --filter web test
      # Contract drift gate, TS side (design §6.1): the committed generated
      # client must match openapi.json; regeneration must be a no-op.
      - run: pnpm --filter @govfolio/contracts generate && git diff --exit-code packages/contracts/

  # Enforces docs/decisions/automation-policy.md: destructive migrations and
  # over-budget terraform destroys must fail closed, not merge.
  guardrails:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          # validate-authority --ci (check c) inspects HEAD's parents and the
          # merged-side commit messages — a shallow clone would fail closed.
          fetch-depth: 0
      - uses: Swatinem/rust-cache@v2
      # Invariant 9 (goal 100, design §4.2 run point 2): goal-queue bijection,
      # AUTHORITY.lock.json pins, amendment discipline. A poisoned tree cannot merge.
      - name: authority lock + goal-queue bijection
        run: cargo run -q -p pipeline --bin validate-authority -- --ci
      - name: migrations expand-only
        run: sh scripts/check-migration-safety.sh crates/core/migrations
      # CI has no cloud credentials by design, so the destroy-budget gate
      # (plan + scripts/check-tf-plan.sh) runs fail-closed in deploy.yml immediately
      # before ANY apply. Here: syntax + schema validation only (auth-free).
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false
      - name: terraform fmt/validate
        run: |
          terraform -chdir=infra fmt -check
          terraform -chdir=infra init -backend=false -input=false
          terraform -chdir=infra validate
